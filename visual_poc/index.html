<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Visual PoC — колір по жесту</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d12;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .sub { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
    .square {
      width: 280px;
      height: 280px;
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(255,255,255,0.15);
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }
    .square.idle   { background: #c0392b; box-shadow: 0 0 60px rgba(192,57,43,0.4); }
    .square.ready { background: #f1c40f; box-shadow: 0 0 60px rgba(241,196,15,0.4); }
    .square.action { background: #27ae60; box-shadow: 0 0 60px rgba(39,174,96,0.4); }
    .square.scroll { background: #2980b9; box-shadow: 0 0 60px rgba(41,128,185,0.4); }
    .square.raised_hand { background: #00bcd4; box-shadow: 0 0 60px rgba(0,188,212,0.4); }
    .status {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .status.connected { color: #2ecc71; }
    .status.disconnected { color: #e74c3c; }
    .gesture { text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .coords { font-size: 0.8rem; color: #888; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <h1>Atlas Visual PoC</h1>
  <p class="sub">Підніміть руку перед камерою — колір квадрата змінюється по жесту</p>
  <div id="square" class="square idle"></div>
  <div id="status" class="status disconnected">З’єднання з Atlas...</div>

  <script>
    const square = document.getElementById('square');
    const statusEl = document.getElementById('status');
    const wsPort = 8766;
    const host = location.hostname || '127.0.0.1';
    const wsUrl = `ws://${host}:${wsPort}`;

    let ws = null;
    let reconnectTimer = null;

    function setStatus(connected, text) {
      statusEl.textContent = text;
      statusEl.className = 'status ' + (connected ? 'connected' : 'disconnected');
    }

    function updateUI(data) {
      if (data.gesture) {
        square.className = 'square ' + data.gesture;
        statusEl.innerHTML = `<span class="gesture">${data.gesture}</span>${data.color ? ' · ' + data.color : ''}`;
      }
      if (data.x !== undefined && data.y !== undefined) {
        const coords = document.querySelector('.coords');
        if (coords) coords.textContent = `x: ${data.x.toFixed(2)}  y: ${data.y.toFixed(2)}`;
      }
    }

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => setStatus(true, 'Підключено до Atlas');
      ws.onclose = () => {
        setStatus(false, 'Відключено. Перепідключення...');
        reconnectTimer = setTimeout(connect, 2000);
      };
      ws.onerror = () => {};
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'gesture') {
            updateUI({ gesture: data.gesture, color: data.color });
          } else if (data.type === 'hand') {
            updateUI({ x: data.x, y: data.y });
          }
        } catch (e) {}
      };
    }

    connect();
  </script>
</body>
</html>
